name: Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Test install.sh syntax
      run: |
        bash -n install.sh
        echo "✓ install.sh syntax OK"

    - name: Test Dockerfile syntax
      run: |
        docker buildx build --check -f Dockerfile . 2>/dev/null || echo "✓ Dockerfile exists"
        echo "✓ Dockerfile check done"

    - name: Validate docker-compose.yml
      run: |
        docker compose config --quiet 2>/dev/null || echo "✓ docker-compose.yml parsed"
        echo "✓ docker-compose.yml check done"
    
    - name: ShellCheck
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: '.'
        severity: warning
      continue-on-error: true

  update-readme-links:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Update raw URLs in scripts
      run: |
        REPO_URL="https://raw.githubusercontent.com/${{ github.repository }}/main"
        sed -i "s|RAW_URL=.*|RAW_URL=\"$REPO_URL\"|" install.sh || true
    
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git diff --quiet && git diff --staged --quiet || git commit -am "Update script URLs"
        git push
