# LinuxServer Webtop + DinD + GPU 加速 + 完整开发环境
#
# 使用 LinuxServer 标准持久化方式：挂载 /config

services:
  webtop-full:
    build:
      context: .
      dockerfile: Dockerfile.webtop-full
    
    image: my-webtop-full:latest
    container_name: webtop-full
    hostname: webtop-full
    
    privileged: true
    
    environment:
      - ENABLE_DIND=true
      - USE_CHINA_MIRROR=false
      - SYSTEM_LANG=zh_CN
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - PIXELFLUX_WAYLAND=true
    
    volumes:
      # LinuxServer 标准持久化目录
      - ./webtop-data:/config
    
    ports:
      - "3000:3000"
    
    devices:
      - /dev/dri:/dev/dri
    
    shm_size: "2gb"
    
    restart: unless-stopped
