# LinuxServer Webtop + DinD + GPU 加速 + 完整开发环境
#
# 基于 linuxserver/webtop:ubuntu-{desktop}（2025.06+ Selkies）
# 官方文档: https://docs.linuxserver.io/images/docker-webtop/
#
# 使用 LinuxServer 标准持久化方式：挂载 /config
#
# 构建选项:
#   默认 lxqt 桌面:   docker compose build
#   KDE 桌面:         DESKTOP=kde docker compose build
#   国内源:            USE_CHINA_MIRROR=true docker compose build
#   或在 .env 文件中设置: DESKTOP=kde
#                         USE_CHINA_MIRROR=true
#
# 分辨率: Selkies 自适应浏览器窗口大小（推荐）
#   固定分辨率: SELKIES_MANUAL_WIDTH=1440 + SELKIES_MANUAL_HEIGHT=900

services:
  agent-workspace:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时参数（仅影响镜像构建，运行时无效）
        # DESKTOP: kde(1.1G) | xfce(800M) | lxqt(300M)
        - DESKTOP=${DESKTOP:-lxqt}
        - USE_CHINA_MIRROR=${USE_CHINA_MIRROR:-false}

    image: xuping/agent-workspace:ubuntu-${DESKTOP:-lxqt}
    container_name: agent-workspace
    hostname: agent-workspace

    # Docker 模式（按需选择一种）:
    #   DinD 模式:      取消注释 privileged + START_DOCKER=true
    #   挂载宿主机模式:  取消注释 volumes 中的 docker.sock
    #   不启用 Docker:   保持默认（START_DOCKER=false）
    #privileged: true

    environment:
      # --- LinuxServer 标准变量 ---
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - LC_ALL=zh_CN.UTF-8
      - TITLE=Webtop
      # --- Docker（默认不启用，按需选择模式）---
      - START_DOCKER=false
      #- START_DOCKER=true  # DinD 模式时启用
      # --- Selkies 显示 ---
      - SELKIES_ENABLE_WAYLAND=true
      - PIXELFLUX_WAYLAND=false  # 强制 X11，Wayland 下 Selkies 无法输入中文
      - SELKIES_SCALING_DPI=${SELKIES_SCALING_DPI:-96}  # 高分屏(Retina)设为 192
      - XCURSOR_THEME=Adwaita
      - XCURSOR_SIZE=32
      # --- Selkies 低延迟优化 ---
      - SELKIES_USE_BROWSER_CURSORS=true   # CSS 光标，鼠标零延迟
      - SELKIES_CONGESTION_CONTROL=true    # 网络拥塞控制，自适应码率
      - SELKIES_H264_CRF=28               # 画质略低，编码更快（默认 25）
      - SELKIES_JPEG_QUALITY=30            # JPEG 回退模式低质量优先（默认 40）
      - SELKIES_H264_STREAMING_MODE=true   # H264 流式模式，降低编码延迟
      # --- GPU 渲染/编码设备路径（按需启用）---
      # Intel/AMD: 取消注释 DRINODE + devices 部分
      # NVIDIA: 还需取消注释 deploy 部分 + NVIDIA_* 变量
      #- DRINODE=/dev/dri/renderD128
      #- NVIDIA_VISIBLE_DEVICES=all
      #- NVIDIA_DRIVER_CAPABILITIES=all
      # --- 自定义（仅 init 服务使用）---
      - USE_CHINA_MIRROR=false
      # --- Node.js ---
      - NODE_OPTIONS=--max-old-space-size=2048

    volumes:
      # LinuxServer 标准持久化目录
      - ./webtop-data:/config
      # 挂载宿主机 Docker 模式时取消注释
      #- /var/run/docker.sock:/var/run/docker.sock

    ports:
      - "3001:3001"   # HTTPS

    # GPU 设备直通（按需启用）
    # Intel/AMD GPU: 取消注释 devices
    # NVIDIA GPU: 取消注释 devices + deploy
    #devices:
    #  - /dev/dri:/dev/dri
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - driver: nvidia
    #          count: all
    #          capabilities: [gpu]

    shm_size: "2gb"

    restart: unless-stopped
