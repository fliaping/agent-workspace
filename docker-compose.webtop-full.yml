# LinuxServer Webtop + DinD + GPU 加速 + 完整开发环境
#
# 持久化：挂载 /config 目录，首次启动自动初始化
#
# 运行时环境变量：
#   ENABLE_DIND=true|false        - 是否启用 Docker-in-Docker (默认: true)
#   USE_CHINA_MIRROR=true|false   - 是否使用国内软件源 (默认: false)
#   SYSTEM_LANG=zh_CN|en_US       - 系统语言 (默认: zh_CN)

services:
  webtop-full:
    build:
      context: .
      dockerfile: Dockerfile.webtop-full
    
    image: my-webtop-full:latest
    container_name: webtop-full
    hostname: webtop-full
    
    privileged: true
    
    environment:
      - ENABLE_DIND=true
      - USE_CHINA_MIRROR=false
      - SYSTEM_LANG=zh_CN
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - PIXELFLUX_WAYLAND=true
    
    volumes:
      # 持久化目录（包含所有数据）
      # 首次启动为空时，自动从模板初始化
      - ./webtop-data:/config
    
    ports:
      - "3000:3000"
    
    devices:
      - /dev/dri:/dev/dri
    
    shm_size: "2gb"
    
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 2G
    
    restart: unless-stopped
    
    networks:
      - webtop-full-network
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  webtop-full-network:
    driver: bridge
