name: Build Multi-Arch Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: true
        default: 'latest'

env:
  REGISTRY_DOCKERHUB: xuping
  REGISTRY_ALIYUN: registry.cn-hangzhou.aliyuncs.com/fliaping
  IMAGE_NAME: agent-workspace

jobs:
  # ==========================================
  # 构建并推送到 Docker Hub（写入 GHA cache）
  # ==========================================
  build-dockerhub:
    runs-on: ubuntu-latest
    environment: docker-hub
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        desktop: [lxqt, xfce, kde]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ubuntu-${{ matrix.desktop }}
            type=raw,value=ubuntu-${{ matrix.desktop }}-${{ steps.version.outputs.VERSION }},enable=${{ steps.version.outputs.VERSION != 'latest' }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: DESKTOP=${{ matrix.desktop }}
          cache-from: type=gha,scope=${{ matrix.desktop }}
          cache-to: type=gha,mode=max,scope=${{ matrix.desktop }}
          platforms: linux/amd64,linux/arm64

  # ==========================================
  # 从 GHA cache 推送到阿里云（不重新构建）
  # ==========================================
  push-aliyun:
    runs-on: ubuntu-latest
    needs: build-dockerhub
    environment: aliyun
    permissions:
      contents: read
    strategy:
      matrix:
        desktop: [lxqt, xfce, kde]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_ALIYUN }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ubuntu-${{ matrix.desktop }}
            type=raw,value=ubuntu-${{ matrix.desktop }}-${{ steps.version.outputs.VERSION }},enable=${{ steps.version.outputs.VERSION != 'latest' }}

      - name: Push to Aliyun (from GHA cache, no rebuild)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: DESKTOP=${{ matrix.desktop }}
          cache-from: type=gha,scope=${{ matrix.desktop }}
          platforms: linux/amd64,linux/arm64
